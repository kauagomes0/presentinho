<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aceita viver sonhos comigo?</title>
  
  <!-- Fontes Elegantes e Românticas do Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TELA 1: PERGUNTA (Tema Escuro + 4 fotos de fundo) -->
  <section id="screen-1" class="screen active">
    <!-- As 4 fotos de fundo -->
    <div class="bg-gallery">
      <div class="bg-item"><img src="cat.jpeg" alt="Gatinhos"></div>
      <div class="bg-item"><img src="pngtree-cute-couple-capybaras-in-love-png-image_16251792.png" alt="Capivaras"></div>
      <div class="bg-item"><img src="transferir (1).webp" alt="Desenho Casal"></div>
      <div class="bg-item"><img src="transferir.webp" alt="Gato Minecraft"></div>
    </div>

    <!-- Cartão Escuro com Efeito de Vidro (Glassmorphism) -->
    <div class="card-container">
      <span class="badge">✨ Uma Pergunta Especial</span>
      <h1 class="main-title">Aceita viver sonhos comigo??</h1>
      
      <div class="illustration-box">
        <img src="transferir (1).webp" alt="Desenho Casal" class="center-img">
      </div>

      <div class="btn-group">
        <button id="btn-yes" class="btn btn-yes">SIM! 💕</button>
        <button id="btn-no" class="btn btn-no">Não</button>
      </div>
    </div>
  </section>

  <!-- TELA 2: PÓS-SIM (GIF do Gatinho Dançando + Suas 2 Fotos Reais) -->

    <div id="hearts-container"></div>

    <div class="success-box">
      <h2 class="title-ebaaa">Ebaaaaa!!! 🎉✨</h2>
      <p class="subtitle">O nosso futuro vai ser incrível ao seu lado!</p>
      
      <div class="media-container">
        <!-- 1. GIF DO GATINHO DANÇANDO -->
        <div class="media-card gif-card">
          <img src="gatinho.gif" alt="Gatinho Dançando">
        </div>

        <!-- 2. SUAS DUAS FOTOS -->
        <div class="media-card">
          <img src="WhatsApp Image 2026-07-19 at 23.30.53.jpeg" alt="Nossa Foto 1">
        </div>

        <div class="media-card">
          <img src="WhatsApp Image 2026-07-19 at 23.34.04.jpeg" alt="Nossa Foto 2">
        </div>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
